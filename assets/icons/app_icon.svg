<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="docShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0B5650" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Document body -->
  <g transform="translate(260 188)" filter="url(#docShadow)">
    <!-- Main body with rounded corners + cut for fold -->
    <path d="M 60 0
             L 348 0
             L 504 156
             L 504 588
             Q 504 648 444 648
             L 60 648
             Q 0 648 0 588
             L 0 60
             Q 0 0 60 0 Z"
          fill="white"/>
    <!-- Folded corner triangle -->
    <path d="M 348 0
             L 504 156
             L 348 156
             Z"
          fill="url(#fold)"/>

    <!-- Faint text lines (suggests "document with text") -->
    <rect x="76" y="276" width="352" height="22" rx="11" fill="#0F766E" opacity="0.18"/>
    <rect x="76" y="328" width="280" height="22" rx="11" fill="#0F766E" opacity="0.18"/>
    <rect x="76" y="380" width="352" height="22" rx="11" fill="#0F766E" opacity="0.18"/>
    <rect x="76" y="432" width="216" height="22" rx="11" fill="#0F766E" opacity="0.18"/>

    <!-- Checkmark badge bottom-right (signed / done feeling) -->
    <circle cx="408" cy="520" r="72" fill="#10B981"/>
    <path d="M 372 520 L 400 548 L 446 496"
          stroke="white"
          stroke-width="16"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>
</svg>
