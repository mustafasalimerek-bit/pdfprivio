org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Demote JVM-target validation from error to warning. Third-party Flutter
# plugins (receive_sharing_intent, home_widget, etc.) ship with default
# Kotlin target 21 while their Java target stays 1.8 — strict validation
# fails the whole build. Their bytecode runs fine at runtime; the
# inconsistency is a build-time meta-check, not a correctness issue.
kotlin.jvm.target.validation.mode=warning
