name: pdfkitsy
description: "PDFKitsy: Merge, split, compress, sign, OCR PDFs on-device. No subscription, no cloud."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # PDF processing (core feature set)
  pdf: ^3.10.8
  printing: ^5.12.0
  pdfx: ^2.9.0
  syncfusion_flutter_pdf: ^33.2.4

  # Image processing (image -> PDF, PDF -> image)
  image: ^4.1.7
  flutter_image_compress: ^2.3.0

  # File handling
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^12.0.0
  open_filex: ^4.4.0
  permission_handler: ^11.3.1

  # Storage / preferences
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Monetization
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^5.1.0
  app_tracking_transparency: ^2.0.4

  # Analytics + Crash reporting (UMP consent flow will gate Analytics)
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_native_splash: ^2.4.0

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
