name: pdfprivio
description: "Privio: 23 on-device PDF tools — scan, OCR, sign, redact, fill forms, summarise with Apple Intelligence, receipt scanner with CSV export. Never uploaded."
publish_to: 'none'
version: 1.0.0+12

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # PDF processing (core feature set)
  pdf: ^3.10.8
  printing: ^5.12.0
  pdfx: ^2.9.0
  syncfusion_flutter_pdf: ^33.2.4

  # Image processing (image -> PDF, PDF -> image)
  image: ^4.1.7

  # File handling
  file_picker: ^8.0.0+1
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^12.0.0
  open_filex: ^4.4.0

  # Storage / preferences
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Keychain (iOS) / EncryptedSharedPreferences (Android). Used by
  # PromoCodeService to persist redemption flag across uninstall on
  # iOS — abuse-resistance for the 14-day promo grant.
  flutter_secure_storage: ^9.2.2
  # Home Screen Widget bridge — writes recent files into the App
  # Group shared UserDefaults so the iOS WidgetKit extension can
  # render them. App Group: group.com.erekstudio.pdfprivio.
  home_widget: ^0.7.0
  # Inbound "Share to PDFPrivio" / "Open in PDFPrivio" handler.
  # Fires when iOS hands us a PDF or image from another app (Mail,
  # WhatsApp, Files, etc.) via the Share Sheet or via the document
  # types we declare in Info.plist.
  receive_sharing_intent: ^1.8.1

  # Monetization
  in_app_purchase: ^3.2.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_native_splash: ^2.4.0
  reorderable_grid_view: ^2.2.8

  # Signature capture for Sign tool
  signature: ^5.5.0
  crypto: ^3.0.3

  # Text diff for Compare PDFs
  diff_match_patch: ^0.4.1

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.2.6
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0F766E"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0F766E"
  image: assets/icons/splash_icon.png
  android_12:
    color: "#0F766E"
    image: assets/icons/splash_icon.png
